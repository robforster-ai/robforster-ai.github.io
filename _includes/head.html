<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

<!-- SEO: remove the noindex meta tag once the site is ready to be indexed -->
<meta name="robots" content="noindex, nofollow">

<!-- Theme: apply before render to avoid flash -->
<script>
  (function(){var t=localStorage.getItem('theme')||
    (window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    if(t==='dark')document.documentElement.setAttribute('data-theme','dark');
  })();
</script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<!-- Plausible Analytics -->
<script defer data-domain="robforster-ai.github.io" src="https://plausible.io/js/script.js"></script>

<!-- Favicons -->
<link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">

<!-- Open Graph / Social Sharing -->
<meta property="og:type"
  content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:site_name" content="Rob Forster | Enterprise AI">
<meta property="og:url"
  content="{{ page.url | absolute_url }}">
<meta property="og:title"
  content="{% if page.title %}{{ page.title }} | Rob Forster{% else %}Rob Forster | Enterprise AI Transformation Lead{% endif %}">
<meta property="og:description"
  content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% elsif page.description %}{{ page.description }}{% else %}Practitioner writing on enterprise AI transformation, programme delivery and the gap between what technology promises and what it takes to make it real.{% endif %}">
<meta property="og:image"
  content="{% if page.layout == 'post' %}{{ site.url }}/assets/img/og/{{ page.slug }}.png{% elsif page.og_image %}{{ site.url }}/assets/img/{{ page.og_image }}{% else %}{{ site.url }}/assets/img/og-default.png{% endif %}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="en_GB">

<!-- Twitter / X Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title"
  content="{% if page.title %}{{ page.title }} | Rob Forster{% else %}Rob Forster | Enterprise AI Transformation Lead{% endif %}">
<meta name="twitter:description"
  content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% elsif page.description %}{{ page.description }}{% else %}Practitioner writing on enterprise AI transformation, programme delivery and the gap between what technology promises and what it takes to make it real.{% endif %}">
<meta name="twitter:image"
  content="{% if page.layout == 'post' %}{{ site.url }}/assets/img/og/{{ page.slug }}.png{% elsif page.og_image %}{{ site.url }}/assets/img/{{ page.og_image }}{% else %}{{ site.url }}/assets/img/og-default.png{% endif %}">

<!-- Article-specific tags for blog posts -->
{% if page.layout == 'post' %}
<meta property="article:author" content="Rob Forster">
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
{% if page.category %}
<meta property="article:section" content="{{ page.category }}">
{% endif %}
{% endif %}
