<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f5e"/>
      <stop offset="100%" stop-color="#0e1e3d"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B08D57"/>
      <stop offset="100%" stop-color="#d4a96a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- Top gold accent bar -->
  <rect width="960" height="5" fill="url(#goldBar)"/>

  <!-- ── TITLE AREA ── -->
  <text x="480" y="54" font-size="13" font-weight="700" letter-spacing="5" fill="#B08D57" text-anchor="middle">AI GOVERNANCE FRAMEWORK</text>
  <line x1="200" y1="66" x2="760" y2="66" stroke="#B08D57" stroke-width="0.8" opacity="0.4"/>

  <!-- ══════════════════════════════════
       ROW 1: EXECUTIVE SPONSOR
  ══════════════════════════════════ -->
  <!-- Card -->
  <rect x="310" y="82" width="340" height="76" rx="6" fill="rgba(176,141,87,0.15)" stroke="#B08D57" stroke-width="1.5"/>
  <rect x="310" y="82" width="6" height="76" rx="3" fill="#B08D57"/>
  <text x="485" y="114" font-size="15" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">EXECUTIVE SPONSOR</text>
  <text x="485" y="137" font-size="11.5" fill="rgba(212,180,131,0.85)" text-anchor="middle">CTO · CDO · Chief AI Officer</text>

  <!-- Down arrow -->
  <line x1="480" y1="158" x2="480" y2="178" stroke="#B08D57" stroke-width="1.5" opacity="0.7"/>
  <polygon points="474,175 486,175 480,184" fill="#B08D57" opacity="0.7"/>

  <!-- ══════════════════════════════════
       ROW 2: THREE GOVERNANCE CARDS
  ══════════════════════════════════ -->
  <!-- Horizontal connector -->
  <line x1="148" y1="240" x2="812" y2="240" stroke="#B08D57" stroke-width="1" opacity="0.3"/>
  <!-- Vertical stubs up -->
  <line x1="148" y1="184" x2="148" y2="240" stroke="#B08D57" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <line x1="812" y1="184" x2="812" y2="240" stroke="#B08D57" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>

  <!-- Card A: Programme Director -->
  <rect x="36" y="190" width="226" height="100" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(176,141,87,0.35)" stroke-width="1.2"/>
  <text x="149" y="220" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">PROGRAMME</text>
  <text x="149" y="237" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">DIRECTOR</text>
  <text x="149" y="260" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Delivery · Scope · Cadence</text>
  <text x="149" y="277" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Programme risk register</text>

  <!-- Card B: Ethics Lead (gold) -->
  <rect x="367" y="190" width="226" height="100" rx="6" fill="rgba(176,141,87,0.18)" stroke="#B08D57" stroke-width="1.8"/>
  <text x="480" y="220" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">AI ETHICS</text>
  <text x="480" y="237" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">LEAD</text>
  <text x="480" y="260" font-size="10" fill="rgba(212,180,131,0.8)" text-anchor="middle">Responsible AI · Impact</text>
  <text x="480" y="277" font-size="10" fill="rgba(212,180,131,0.8)" text-anchor="middle">Bias testing · Oversight</text>

  <!-- Card C: Risk & Controls -->
  <rect x="698" y="190" width="226" height="100" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(176,141,87,0.35)" stroke-width="1.2"/>
  <text x="811" y="220" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">AI RISK &amp;</text>
  <text x="811" y="237" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">CONTROLS</text>
  <text x="811" y="260" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Model risk · KRI monitoring</text>
  <text x="811" y="277" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Model inventory · Validation</text>

  <!-- Down arrows to row 3 -->
  <line x1="240" y1="314" x2="240" y2="338" stroke="#B08D57" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="720" y1="314" x2="720" y2="338" stroke="#B08D57" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- ══════════════════════════════════
       ROW 3: OPERATIONAL CARDS
  ══════════════════════════════════ -->
  <!-- Card D: Data & AI Platform -->
  <rect x="80" y="340" width="320" height="90" rx="6" fill="rgba(255,255,255,0.09)" stroke="rgba(74,106,168,0.6)" stroke-width="1.2"/>
  <rect x="80" y="340" width="5" height="90" rx="2" fill="#2A4A7F"/>
  <text x="252" y="372" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">DATA &amp; AI PLATFORM</text>
  <text x="252" y="393" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Data standards · Architecture</text>
  <text x="252" y="410" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Security controls · Versioning</text>

  <!-- Card E: Business Process Owner -->
  <rect x="560" y="340" width="320" height="90" rx="6" fill="rgba(255,255,255,0.09)" stroke="rgba(74,106,168,0.6)" stroke-width="1.2"/>
  <rect x="560" y="340" width="5" height="90" rx="2" fill="#B08D57"/>
  <text x="732" y="372" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">BUSINESS PROCESS</text>
  <text x="732" y="389" font-size="12" font-weight="700" fill="white" text-anchor="middle" letter-spacing="0.5">OWNER</text>
  <text x="732" y="410" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Adoption · Outcome accountability</text>

  <!-- ══════════════════════════════════
       FOOTER: GOVERNANCE FORUM
  ══════════════════════════════════ -->
  <rect x="0" y="464" width="960" height="76" fill="rgba(0,0,0,0.35)"/>
  <line x1="0" y1="464" x2="960" y2="464" stroke="#B08D57" stroke-width="1" opacity="0.4"/>
  <circle cx="288" cy="502" r="3" fill="#B08D57" opacity="0.6"/>
  <circle cx="672" cy="502" r="3" fill="#B08D57" opacity="0.6"/>
  <text x="480" y="497" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">AI GOVERNANCE FORUM</text>
  <text x="480" y="520" font-size="10.5" fill="rgba(255,255,255,0.45)" text-anchor="middle">Monthly · Pipeline Review · Production Performance · Issues &amp; Incidents</text>

</svg>
