<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f3c88"/>
      <stop offset="100%" stop-color="#4a90e2"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a18"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#f5f7fa"/>

  <!-- Broken platform -->
  <rect x="100" y="400" width="400" height="40" fill="#2c3e50"/>
  <rect x="700" y="400" width="400" height="40" fill="#2c3e50"/>

  <!-- Gap -->
  <polygon points="500,400 700,400 600,460" fill="#34495e"/>

  <!-- AI Chip -->
  <rect x="500" y="200" width="200" height="120" rx="12" fill="url(#blueGrad)"/>
  <text x="600" y="275" font-size="48" text-anchor="middle" fill="white" font-family="Arial">AI</text>

  <!-- Circuit lines -->
  <g stroke="#4a90e2" stroke-width="3">
    <line x1="500" y1="220" x2="450" y2="200"/>
    <line x1="700" y1="220" x2="750" y2="200"/>
    <line x1="500" y1="280" x2="450" y2="300"/>
    <line x1="700" y1="280" x2="750" y2="300"/>
  </g>

  <!-- Robot arm -->
  <g fill="url(#blueGrad)">
    <rect x="150" y="250" width="60" height="150" rx="20"/>
    <rect x="200" y="220" width="120" height="40" rx="20"/>
    <circle cx="320" cy="240" r="25"/>
  </g>

  <!-- Business people -->
  <g fill="#2c3e50">
    <circle cx="820" cy="320" r="20"/>
    <rect x="800" y="340" width="40" height="80" rx="10"/>
    <circle cx="900" cy="320" r="20"/>
    <rect x="880" y="340" width="40" height="80" rx="10"/>
    <circle cx="980" cy="320" r="20"/>
    <rect x="960" y="340" width="40" height="80" rx="10"/>
  </g>

  <!-- Warning + gears -->
  <g>
    <circle cx="550" cy="520" r="40" fill="url(#orangeGrad)"/>
    <text x="550" y="535" font-size="36" text-anchor="middle" fill="white">!</text>

    <circle cx="480" cy="560" r="25" fill="#34495e"/>
    <circle cx="620" cy="560" r="25" fill="#34495e"/>
  </g>

  <!-- Tangled line -->
  <path d="M200 550 C250 500, 300 600, 350 550 S450 600, 500 550" 
        stroke="#2c3e50" stroke-width="4" fill="none"/>

  <!-- Hourglass -->
  <g transform="translate(850,500)">
    <rect x="0" y="0" width="60" height="120" rx="10" fill="#2c3e50"/>
    <polygon points="10,10 50,10 30,50" fill="url(#orangeGrad)"/>
    <polygon points="10,110 50,110 30,70" fill="url(#orangeGrad)"/>
  </g>

  <!-- Calendar -->
  <g transform="translate(950,500)">
    <rect width="120" height="100" rx="10" fill="#ffffff" stroke="#2c3e50"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="#2c3e50"/>
    <text x="60" y="75" text-anchor="middle" font-size="36" fill="#e74c3c">✕</text>
  </g>

</svg>