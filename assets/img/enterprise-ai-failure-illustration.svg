<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" role="img">
<title>Why enterprise AI programmes fail — it's not the technology</title>
<desc>An illustrative metaphor showing a tall AI technology tower built on cracked, shallow organisational foundations tilting under strain, contrasted with a stable structure built on deep organisational bedrock. The visual argument: the constraint is never the technology, it is always the depth of what sits beneath it.</desc>

<defs>
<linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#D4C5A0" stop-opacity="0.35"/>
  <stop offset="100%" stop-color="#B8A87A" stop-opacity="0.12"/>
</linearGradient>
</defs>

<!-- Ground plane -->
<rect x="0" y="340" width="680" height="280" fill="url(#ground)"/>
<line x1="0" y1="340" x2="680" y2="340" stroke="#B8A87A" stroke-width="0.5" opacity="0.6"/>

<!-- Divider -->
<line x1="340" y1="50" x2="340" y2="590" stroke="#B8A87A" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

<!-- ===== LEFT SIDE: Impressive but unstable ===== -->
<g transform="translate(165, 0)">

  <!-- Tall tower — navy/gold tones -->
  <rect x="20" y="100" width="140" height="240" rx="3" fill="#1B2A4A" opacity="0.08" stroke="#1B2A4A" stroke-width="0.5"/>
  <!-- Window grid -->
  <rect x="30" y="110" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="98" y="110" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="30" y="150" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="98" y="150" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="30" y="190" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="98" y="190" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="30" y="230" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="98" y="230" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="30" y="270" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>
  <rect x="98" y="270" width="52" height="30" rx="2" fill="#1B2A4A" opacity="0.12"/>

  <!-- Penthouse + spire -->
  <rect x="65" y="68" width="50" height="32" rx="2" fill="#1B2A4A" opacity="0.06" stroke="#1B2A4A" stroke-width="0.5"/>
  <polygon points="90,48 120,68 60,68" fill="#1B2A4A" opacity="0.1" stroke="#1B2A4A" stroke-width="0.5"/>

  <!-- Thin cracked foundation (rotated slightly for tilt feel) -->
  <g transform="rotate(2.5, 90, 340)">
    <rect x="15" y="340" width="150" height="50" rx="2" fill="#C4956A" opacity="0.3" stroke="#A0714A" stroke-width="0.5"/>

    <!-- Cracks -->
    <path d="M40 355 L40 385" stroke="#8B4513" stroke-width="1.5" opacity="0.5" fill="none"/>
    <path d="M32 360 L48 380" stroke="#8B4513" stroke-width="1" opacity="0.35" fill="none"/>
    <path d="M80 350 L85 390" stroke="#8B4513" stroke-width="1.5" opacity="0.5" fill="none"/>
    <path d="M78 358 L92 382" stroke="#8B4513" stroke-width="1" opacity="0.35" fill="none"/>
    <path d="M120 352 L115 388" stroke="#8B4513" stroke-width="1.5" opacity="0.5" fill="none"/>
    <path d="M125 362 L112 378" stroke="#8B4513" stroke-width="1" opacity="0.35" fill="none"/>
    <path d="M145 358 L150 385" stroke="#8B4513" stroke-width="1" opacity="0.4" fill="none"/>
  </g>

  <!-- Shallow stumps -->
  <path d="M15 390 L15 420" stroke="#C4956A" stroke-width="4" opacity="0.25" fill="none"/>
  <path d="M55 390 L55 410" stroke="#C4956A" stroke-width="4" opacity="0.25" fill="none"/>
  <path d="M125 390 L125 415" stroke="#C4956A" stroke-width="4" opacity="0.25" fill="none"/>
  <path d="M165 390 L165 408" stroke="#C4956A" stroke-width="4" opacity="0.25" fill="none"/>

</g>

<!-- ===== RIGHT SIDE: Modest but delivers value ===== -->
<g transform="translate(430, 0)">

  <!-- Shorter tower — teal/gold tones -->
  <rect x="20" y="180" width="140" height="160" rx="3" fill="#1B4A3A" opacity="0.08" stroke="#1B4A3A" stroke-width="0.5"/>
  <rect x="30" y="190" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>
  <rect x="98" y="190" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>
  <rect x="30" y="230" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>
  <rect x="98" y="230" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>
  <rect x="30" y="270" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>
  <rect x="98" y="270" width="52" height="30" rx="2" fill="#1B4A3A" opacity="0.12"/>

  <!-- Penthouse + spire -->
  <rect x="65" y="148" width="50" height="32" rx="2" fill="#1B4A3A" opacity="0.06" stroke="#1B4A3A" stroke-width="0.5"/>
  <polygon points="90,128 120,148 60,148" fill="#1B4A3A" opacity="0.1" stroke="#1B4A3A" stroke-width="0.5"/>

  <!-- Solid foundation pad -->
  <rect x="10" y="340" width="160" height="50" rx="2" fill="#2A6B52" opacity="0.2" stroke="#1B4A3A" stroke-width="0.5"/>

  <!-- Deep foundation layers — widening as they go deeper -->
  <rect x="5" y="390" width="170" height="30" rx="2" fill="#2A6B52" opacity="0.15" stroke="#1B4A3A" stroke-width="0.5"/>
  <rect x="0" y="420" width="180" height="30" rx="2" fill="#2A6B52" opacity="0.18" stroke="#1B4A3A" stroke-width="0.5"/>
  <rect x="-5" y="450" width="190" height="30" rx="2" fill="#2A6B52" opacity="0.22" stroke="#1B4A3A" stroke-width="0.5"/>
  <rect x="-10" y="480" width="200" height="35" rx="2" fill="#2A6B52" opacity="0.28" stroke="#1B4A3A" stroke-width="0.5"/>

</g>

<!-- ===== LABELS ===== -->
<!-- Left side labels -->
<text x="255" y="80" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="12" fill="#1B2A4A" opacity="0.55" font-style="italic">Technology programme</text>

<text x="255" y="438" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" fill="#8B4513" opacity="0.8">Shallow foundations</text>
<text x="255" y="458" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#8B4513" opacity="0.6">No change programme</text>
<text x="255" y="474" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#8B4513" opacity="0.6">No business ownership</text>
<text x="255" y="490" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#8B4513" opacity="0.6">Stakeholders misaligned</text>

<text x="255" y="560" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="12" fill="#1B2A4A" opacity="0.45" font-style="italic">Impressive but unstable</text>

<!-- Right side labels -->
<text x="520" y="128" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="12" fill="#1B4A3A" opacity="0.55" font-style="italic">Technology programme</text>

<text x="520" y="398" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="13" font-weight="500" fill="#1B4A3A" opacity="0.8">Deep foundations</text>
<text x="520" y="432" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#1B4A3A" opacity="0.6">Change management</text>
<text x="520" y="462" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#1B4A3A" opacity="0.6">Executive sponsorship</text>
<text x="520" y="492" text-anchor="middle" dominant-baseline="central" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="11" fill="#1B4A3A" opacity="0.6">Staged deployment</text>

<text x="520" y="560" text-anchor="middle" dominant-baseline="central" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="12" fill="#1B4A3A" opacity="0.45" font-style="italic">Modest but delivers value</text>

</svg>
