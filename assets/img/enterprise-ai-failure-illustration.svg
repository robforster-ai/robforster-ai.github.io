<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 620" role="img">

<style>
  .title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 600; fill: #1F3A5F; }
  .label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #2F3E4E; }
  .subtle { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #6B7785; }
</style>

<!-- Background -->
<rect x="0" y="0" width="680" height="620" fill="#FFFFFF"/>

<!-- Ground -->
<rect x="0" y="340" width="680" height="280" fill="#F5F7FA"/>
<line x1="0" y1="340" x2="680" y2="340" stroke="#D0D6DC" stroke-width="1"/>

<!-- Divider -->
<line x1="340" y1="60" x2="340" y2="580" stroke="#D0D6DC" stroke-width="1" stroke-dasharray="4 6"/>

<!-- ===== LEFT: Unstable ===== -->
<g transform="translate(165,0)">

  <!-- Tower -->
  <rect x="20" y="110" width="140" height="230" rx="2" fill="#1F3A5F" opacity="0.08" stroke="#1F3A5F" stroke-width="1"/>

  <!-- Windows -->
  <g fill="#1F3A5F" opacity="0.12">
    <rect x="30" y="120" width="50" height="28"/>
    <rect x="100" y="120" width="50" height="28"/>
    <rect x="30" y="160" width="50" height="28"/>
    <rect x="100" y="160" width="50" height="28"/>
    <rect x="30" y="200" width="50" height="28"/>
    <rect x="100" y="200" width="50" height="28"/>
    <rect x="30" y="240" width="50" height="28"/>
    <rect x="100" y="240" width="50" height="28"/>
  </g>

  <!-- Top -->
  <rect x="65" y="80" width="50" height="30" fill="#1F3A5F" opacity="0.08"/>

  <!-- Weak foundation -->
  <rect x="15" y="340" width="150" height="40" fill="#D9DEE3"/>

  <!-- Cracks -->
  <g stroke="#9AA5B1" stroke-width="1.2">
    <line x1="40" y1="350" x2="40" y2="380"/>
    <line x1="80" y1="345" x2="85" y2="380"/>
    <line x1="120" y1="348" x2="115" y2="380"/>
  </g>

</g>

<!-- ===== RIGHT: Stable ===== -->
<g transform="translate(430,0)">

  <!-- Tower -->
  <rect x="20" y="190" width="140" height="150" rx="2" fill="#1F3A5F" opacity="0.08" stroke="#1F3A5F" stroke-width="1"/>

  <!-- Windows -->
  <g fill="#1F3A5F" opacity="0.12">
    <rect x="30" y="200" width="50" height="28"/>
    <rect x="100" y="200" width="50" height="28"/>
    <rect x="30" y="240" width="50" height="28"/>
    <rect x="100" y="240" width="50" height="28"/>
  </g>

  <!-- Top -->
  <rect x="65" y="160" width="50" height="30" fill="#1F3A5F" opacity="0.08"/>

  <!-- Strong foundation -->
  <rect x="10" y="340" width="160" height="40" fill="#C7D2DE"/>

  <!-- Deep layers -->
  <rect x="5" y="380" width="170" height="25" fill="#DCE3EA"/>
  <rect x="0" y="405" width="180" height="25" fill="#E6EBF0"/>
  <rect x="-5" y="430" width="190" height="30" fill="#F0F3F6"/>

</g>

<!-- ===== TITLES ===== -->
<text x="170" y="70" class="label" text-anchor="middle">Technology-led</text>
<text x="170" y="560" class="subtle" text-anchor="middle">Impressive but unstable</text>

<text x="510" y="70" class="label" text-anchor="middle">Business-led</text>
<text x="510" y="560" class="subtle" text-anchor="middle">Modest but delivers value</text>

<!-- ===== FOUNDATION TEXT ===== -->
<text x="170" y="410" class="label" text-anchor="middle">Weak foundations</text>
<text x="170" y="430" class="subtle" text-anchor="middle">No ownership • Misaligned stakeholders • No change plan</text>

<text x="510" y="400" class="label" text-anchor="middle">Strong foundations</text>
<text x="510" y="420" class="subtle" text-anchor="middle">Executive sponsorship • Change management • Phased delivery</text>

</svg>