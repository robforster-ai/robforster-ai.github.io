# Use Cases Library
# business: Finance | HR | Supply Chain | Customer Service | IT | Legal
# process: Automation | Analytics | Knowledge | Agents | Generation

- name: "Automated Invoice Processing"
  business: "Finance"
  process: "Automation"
  description: "AI extracts, validates, and routes invoice data from unstructured documents, matching against purchase orders and flagging discrepancies. Reduces manual processing time and error rates across high-volume AP workflows."
  impact: "High"
  impact_label: "High Impact"

- name: "Financial Anomaly Detection"
  business: "Finance"
  process: "Analytics"
  description: "Machine learning models continuously monitor transaction streams to detect unusual patterns indicative of fraud, error, or policy violations. Enables real-time alerts and audit trails without manual review overhead."
  impact: "High"
  impact_label: "High Impact"

- name: "Regulatory Reporting Generation"
  business: "Finance"
  process: "Generation"
  description: "LLMs synthesise structured financial data and commentary into draft regulatory reports aligned with submission templates. Reduces report preparation time from days to hours while maintaining compliance traceability."
  impact: "High"
  impact_label: "High Impact"

- name: "CV Screening & Shortlisting"
  business: "HR"
  process: "Automation"
  description: "AI parses and scores incoming applications against role criteria, surfacing top candidates for hiring manager review. Cuts time-to-shortlist significantly while improving consistency across large applicant pools."
  impact: "High"
  impact_label: "High Impact"

- name: "Employee Knowledge Assistant"
  business: "HR"
  process: "Knowledge"
  description: "A conversational AI assistant answers employee questions about policies, benefits, and processes by retrieving answers from the HR knowledge base. Reduces HR helpdesk ticket volume and improves self-service resolution rates."
  impact: "Medium"
  impact_label: "Medium Impact"

- name: "Learning Path Personalisation"
  business: "HR"
  process: "Analytics"
  description: "AI analyses employee skills gaps, performance data, and career goals to recommend personalised learning content and development paths. Improves training relevance and completion rates across the workforce."
  impact: "Medium"
  impact_label: "Medium Impact"

- name: "Demand Forecasting"
  business: "Supply Chain"
  process: "Analytics"
  description: "ML models ingest sales history, external signals, and seasonality to produce granular demand forecasts across SKUs and geographies. Enables procurement teams to optimise inventory levels and reduce both stockouts and overstock."
  impact: "High"
  impact_label: "High Impact"

- name: "Supplier Risk Monitoring"
  business: "Supply Chain"
  process: "Agents"
  description: "Autonomous agents continuously scan news, financial filings, and regulatory databases to surface emerging supplier risks. Provides supply chain teams with early warning signals before disruptions materialise."
  impact: "High"
  impact_label: "High Impact"

- name: "Logistics Route Optimisation"
  business: "Supply Chain"
  process: "Automation"
  description: "AI optimises delivery routes in real-time by factoring in traffic, weather, vehicle capacity, and delivery windows. Reduces fuel costs and improves on-time delivery performance across large fleets."
  impact: "Medium"
  impact_label: "Medium Impact"

- name: "Intelligent Triage & Routing"
  business: "Customer Service"
  process: "Automation"
  description: "AI classifies inbound customer contacts by intent and sentiment, routing them to the most appropriate agent or automated resolution path. Reduces misrouting, average handle time, and customer effort scores."
  impact: "High"
  impact_label: "High Impact"

- name: "Agent Assist & Knowledge Retrieval"
  business: "Customer Service"
  process: "Knowledge"
  description: "Real-time AI surfaces relevant knowledge articles, customer history, and suggested responses to agents during live interactions. Reduces average handle time and improves first-contact resolution without increasing headcount."
  impact: "High"
  impact_label: "High Impact"

- name: "Automated Case Summarisation"
  business: "Customer Service"
  process: "Generation"
  description: "LLMs generate concise summaries of customer interaction histories, enabling agents to quickly understand context when handling escalations or transfers. Reduces after-call work and improves case handover quality."
  impact: "Medium"
  impact_label: "Medium Impact"

- name: "IT Incident Classification"
  business: "IT"
  process: "Automation"
  description: "AI automatically classifies, prioritises, and routes incoming IT incidents based on description and historical patterns. Reduces triage time and ensures critical incidents reach the right resolver groups faster."
  impact: "High"
  impact_label: "High Impact"

- name: "Code Review & Security Scanning"
  business: "IT"
  process: "Agents"
  description: "AI agents review pull requests for code quality, security vulnerabilities, and compliance with coding standards, providing actionable inline feedback. Accelerates review cycles and reduces vulnerabilities reaching production."
  impact: "High"
  impact_label: "High Impact"

- name: "Infrastructure Anomaly Detection"
  business: "IT"
  process: "Analytics"
  description: "ML models analyse infrastructure metrics and logs to detect performance degradation or failure precursors before they cause outages. Enables proactive remediation, reducing unplanned downtime and SLA breaches."
  impact: "Medium"
  impact_label: "Medium Impact"

- name: "Contract Review & Redlining"
  business: "Legal"
  process: "Agents"
  description: "AI agents review contract drafts against playbooks, flagging non-standard clauses, missing provisions, and suggested redlines for legal team review. Reduces contract review time from hours to minutes for standard agreements."
  impact: "High"
  impact_label: "High Impact"

- name: "Legal Research & Precedent Finding"
  business: "Legal"
  process: "Knowledge"
  description: "AI retrieves and synthesises relevant case law, regulations, and internal precedents to support legal team research tasks. Reduces research time significantly while improving coverage across large document repositories."
  impact: "High"
  impact_label: "High Impact"

- name: "Compliance Policy Drafting"
  business: "Legal"
  process: "Generation"
  description: "LLMs generate first drafts of compliance policies, procedures, and regulatory response documents based on structured inputs and regulatory context. Accelerates policy development cycles and ensures consistent formatting and coverage."
  impact: "Medium"
  impact_label: "Medium Impact"
